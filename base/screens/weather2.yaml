# Weather 2 - ALTERNATIVE weather screen (base id 10), a more modern look.
# Sits NEXT TO the original weather.yaml so you can compare them - REUSES its data (g_wx_* globals,
# HA sensors, icons_wx font), so weather.yaml must also be included in your `files:`.
#
# Modern touches: background tinted to the selected day's weather, a large colour-coded centre
# temperature, ANIMATED condition icons (sunny + partly cloudy via animimg frames; other conditions
# fall back to a static glyph), a soft glow that SLIDES along the rim to the selected day, and a
# subtle dim-dip when the day changes. Animated icon frames live in assets/sprites/weather/.

esphome:
  on_boot:
    - priority: 654
      then:
        - lambda: 'id(g_present)[10] = true;'

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icons_wx_big
    size: 64
    bpp: 4
    glyphs: ["󰖙", "󰖔", "󰖕", "󰖑", "󰖝", "󰖓", "󰖖", "󰖗", "󰖘", "󰖐"]

image:
  - id: img_wx_sun0
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun0.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun1
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun1.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun2
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun2.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun3
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun3.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun4
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun4.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun5
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun5.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun6
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun6.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_sun7
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/sun7.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly0
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly0.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly1
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly1.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly2
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly2.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly3
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly3.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly4
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly4.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly5
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly5.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly6
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly6.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_wx_partly7
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/weather/partly7.png"
    type: RGB565
    transparency: alpha_channel

globals:
  - id: g_wx2_sel        # render cache: selected day's condition
    type: std::string
    restore_value: no
  - id: g_wx2_tc         # render cache: selected day's temp in C (colour-coding)
    type: int
    restore_value: no
    initial_value: '-127'
  - id: g_wx2_lastcond   # last condition the hero showed (so we only switch/start the animimg on change)
    type: std::string
    restore_value: no
  - id: g_wx2_gpos       # current glow position (fractional day index) - slides toward g_wx_day
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_wx2_dim        # dim-dip countdown (ticks) on a day change
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: wx2_render
    then:
      - lambda: |-
          int d = id(g_wx_day);
          bool has = (id(g_wx_n) > 0 && d < id(g_wx_n));
          id(g_wx2_sel) = has ? id(g_wx_cond)[d] : id(g_wx_state_cur);
          id(g_wx2_tc)  = has ? id(g_wx_hi)[d] : id(g_wx_now);
      - lvgl.label.update:
          id: wx2_day
          text: !lambda |-
            int d = id(g_wx_day);
            if (id(g_wx_n) <= 0 || d >= id(g_wx_n)) return std::string("TODAY");
            std::string s = id(g_wx_name)[d];
            if (s == "Mon") return std::string("MONDAY");
            if (s == "Tue") return std::string("TUESDAY");
            if (s == "Wed") return std::string("WEDNESDAY");
            if (s == "Thu") return std::string("THURSDAY");
            if (s == "Fri") return std::string("FRIDAY");
            if (s == "Sat") return std::string("SATURDAY");
            if (s == "Sun") return std::string("SUNDAY");
            return s;
      - lvgl.label.update:
          id: wx2_bigicon
          text: !lambda |-
            int d = id(g_wx_day);
            if (id(g_wx_n) > 0 && d < id(g_wx_n)) return id(g_wx_icon)[d];
            std::string s = id(g_wx_state_cur);
            if (s == "clear-night") return std::string("󰖔");
            if (s == "fog") return std::string("󰖑");
            if (s == "windy" || s == "windy-variant") return std::string("󰖝");
            if (s == "lightning" || s == "lightning-rainy") return std::string("󰖓");
            if (s == "pouring") return std::string("󰖖");
            if (s == "rainy") return std::string("󰖗");
            if (s == "snowy" || s == "snowy-rainy" || s == "hail") return std::string("󰖘");
            if (s == "cloudy") return std::string("󰖐");
            return std::string("󰖐");
      - lvgl.label.update:
          id: wx2_temp
          text: !lambda |-
            int d = id(g_wx_day);
            bool f = id(g_wx_fahrenheit);
            char u = f ? 'F' : 'C';
            if (id(g_wx_n) <= 0 || d >= id(g_wx_n)) {
              if (id(g_wx_now) > -100) { int n = id(g_wx_now); if (f) n = n*9/5+32; char b[12]; snprintf(b,sizeof(b),"%d°%c",n,u); return std::string(b); }
              return std::string("--");
            }
            int hi = id(g_wx_hi)[d], lo = id(g_wx_lo)[d];
            if (f) { hi = hi*9/5+32; lo = lo*9/5+32; }
            char b[24]; snprintf(b,sizeof(b),"%d° / %d°",hi,lo); return std::string(b);
      - lvgl.label.update:
          id: wx2_cond
          text: !lambda |-
            if (id(g_wx_n) <= 0) return std::string("Add the HA forecast helper");
            std::string s = id(g_wx2_sel);
            if (s == "sunny") return std::string("Sunny");
            if (s == "clear-night") return std::string("Clear");
            if (s == "partlycloudy") return std::string("Partly Cloudy");
            if (s == "cloudy") return std::string("Cloudy");
            if (s == "fog") return std::string("Fog");
            if (s == "rainy") return std::string("Rainy");
            if (s == "pouring") return std::string("Heavy Rain");
            if (s == "lightning" || s == "lightning-rainy") return std::string("Storm");
            if (s == "snowy" || s == "snowy-rainy") return std::string("Snow");
            if (s == "hail") return std::string("Hail");
            if (s == "windy" || s == "windy-variant") return std::string("Windy");
            if (s == "exceptional") return std::string("Severe");
            return s;
      # hero icon: animated for sunny/partlycloudy, static glyph otherwise. Switch only on change.
      - if:
          condition: { lambda: 'return id(g_wx2_sel) != id(g_wx2_lastcond);' }
          then:
            - lambda: 'id(g_wx2_lastcond) = id(g_wx2_sel);'
            - lvgl.animimg.stop: wx2_a_sun
            - lvgl.animimg.stop: wx2_a_partly
            - lvgl.widget.hide: wx2_a_sun
            - lvgl.widget.hide: wx2_a_partly
            - lvgl.widget.hide: wx2_bigicon
            - if:
                condition: { lambda: 'return id(g_wx2_sel) == "sunny";' }
                then: [ lvgl.widget.show: wx2_a_sun, lvgl.animimg.start: wx2_a_sun ]
            - if:
                condition: { lambda: 'return id(g_wx2_sel) == "partlycloudy";' }
                then: [ lvgl.widget.show: wx2_a_partly, lvgl.animimg.start: wx2_a_partly ]
            - if:
                condition: { lambda: 'return id(g_wx2_sel) != "sunny" && id(g_wx2_sel) != "partlycloudy";' }
                then: [ lvgl.widget.show: wx2_bigicon ]
      - lvgl.widget.update: { id: wx2_glow, hidden: !lambda 'return id(g_wx_n) <= 0;' }
      # rim day icons (uniform soft colour)
      - lvgl.widget.update: { id: wx2_d0, hidden: !lambda 'return 0 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(0 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(0 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d0, text: !lambda 'return id(g_wx_n) > 0 ? id(g_wx_icon)[0] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d1, hidden: !lambda 'return 1 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(1 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(1 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d1, text: !lambda 'return id(g_wx_n) > 1 ? id(g_wx_icon)[1] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d2, hidden: !lambda 'return 2 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(2 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(2 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d2, text: !lambda 'return id(g_wx_n) > 2 ? id(g_wx_icon)[2] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d3, hidden: !lambda 'return 3 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(3 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(3 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d3, text: !lambda 'return id(g_wx_n) > 3 ? id(g_wx_icon)[3] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d4, hidden: !lambda 'return 4 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(4 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(4 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d4, text: !lambda 'return id(g_wx_n) > 4 ? id(g_wx_icon)[4] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d5, hidden: !lambda 'return 5 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(5 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(5 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d5, text: !lambda 'return id(g_wx_n) > 5 ? id(g_wx_icon)[5] : std::string("");' }
      - lvgl.widget.update: { id: wx2_d6, hidden: !lambda 'return 6 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(6 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(6 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx2_d6, text: !lambda 'return id(g_wx_n) > 6 ? id(g_wx_icon)[6] : std::string("");' }
      # colours are fixed to the partly-cloudy palette (set in the widget declarations) - no per-condition change
      # temperature colour by value (C)
      - lvgl.label.update: { id: wx2_temp, text_color: 0xFFFFFF }
      - if: { condition: { lambda: 'return id(g_wx2_tc) > -100 && id(g_wx2_tc) <= 0;' },  then: [ lvgl.label.update: { id: wx2_temp, text_color: 0x7FB2FF } ] }
      - if: { condition: { lambda: 'return id(g_wx2_tc) > 0 && id(g_wx2_tc) < 10;' },     then: [ lvgl.label.update: { id: wx2_temp, text_color: 0x6FD0E8 } ] }
      - if: { condition: { lambda: 'return id(g_wx2_tc) >= 10 && id(g_wx2_tc) < 18;' },   then: [ lvgl.label.update: { id: wx2_temp, text_color: 0x7FE6B0 } ] }
      - if: { condition: { lambda: 'return id(g_wx2_tc) >= 18 && id(g_wx2_tc) < 25;' },   then: [ lvgl.label.update: { id: wx2_temp, text_color: 0xFFD061 } ] }
      - if: { condition: { lambda: 'return id(g_wx2_tc) >= 25;' },                        then: [ lvgl.label.update: { id: wx2_temp, text_color: 0xFF7A4D } ] }

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==10;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_wx_day) = 0; id(g_wx2_gpos) = 0.0f; id(g_wx2_dim) = 0; id(g_wx2_lastcond) = "";'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_weather2, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_weather2, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_weather2, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_weather2, animation: move_bottom, time: 250ms }] }
            - script.execute: wx2_render
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_wx_day) += id(g_knob_delta); id(g_knob_delta) = 0;
                int mx = (id(g_wx_n) > 0) ? id(g_wx_n) - 1 : 0;
                if (id(g_wx_day) < 0) id(g_wx_day) = 0;
                if (id(g_wx_day) > mx) id(g_wx_day) = mx;
            - script.execute: wx2_render
  # smooth motion: slide the glow toward the selected day + ramp the dim-dip down (30ms)
  - interval: 30ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10;' }
          then:
            - lambda: |-
                int n = id(g_wx_n); if (n < 1) n = 1;
                float p = id(g_wx2_gpos), tgt = (float) id(g_wx_day);
                p += (tgt - p) * 0.35f;
                if (fabsf(tgt - p) < 0.02f) p = tgt;
                id(g_wx2_gpos) = p;
                float rx = 140.0f * sinf(p * 6.2831853f / n);
                float ry = -140.0f * cosf(p * 6.2831853f / n);
                lv_obj_set_pos(id(wx2_glow), 180 + (int) lroundf(rx) - 28, 180 + (int) lroundf(ry) - 28);
            - if:   # dim-dip ramp (static opacity steps; masks the instant colour swap)
                condition: { lambda: 'return id(g_wx2_dim) > 0;' }
                then:
                  - if: { condition: { lambda: 'return id(g_wx2_dim) >= 5;' }, then: [ lvgl.widget.update: { id: wx2_dim, bg_opa: 40% } ] }
                  - if: { condition: { lambda: 'return id(g_wx2_dim) == 4;' }, then: [ lvgl.widget.update: { id: wx2_dim, bg_opa: 32% } ] }
                  - if: { condition: { lambda: 'return id(g_wx2_dim) == 3;' }, then: [ lvgl.widget.update: { id: wx2_dim, bg_opa: 22% } ] }
                  - if: { condition: { lambda: 'return id(g_wx2_dim) == 2;' }, then: [ lvgl.widget.update: { id: wx2_dim, bg_opa: 12% } ] }
                  - if: { condition: { lambda: 'return id(g_wx2_dim) == 1;' }, then: [ lvgl.widget.update: { id: wx2_dim, bg_opa: 0% } ] }
                  - lambda: 'id(g_wx2_dim)--;'
  - interval: 1s
    then:
      - if:
          condition: { lambda: 'return id(g_base)==10;' }
          then: [ script.execute: wx2_render ]

lvgl:
  pages:
    - id: page_weather2
      bg_color: 0x0B1020
      widgets:
        - obj: { id: wx2_bg, align: CENTER, x: 0, y: 0, width: 360, height: 360, radius: 0, bg_color: 0x1C2838, bg_opa: COVER, border_width: 0 }
        # soft glow behind the selected day (no align - slid via lv_obj_set_pos)
        - obj: { id: wx2_glow, x: 152, y: 12, width: 56, height: 56, radius: 28, bg_color: 0xCAD6E8, bg_opa: 30%, border_width: 0, hidden: true }
        # rim day icons
        - label: { id: wx2_d0, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d1, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d2, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d3, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d4, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d5, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        - label: { id: wx2_d6, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xDCE6F2, hidden: true }
        # centre hero: animated icons (sunny/partly) OR static glyph (others)
        - animimg: { id: wx2_a_sun, align: CENTER, x: 0, y: -58, duration: 800ms, repeat_count: 65535, auto_start: false, hidden: true, src: [ img_wx_sun0, img_wx_sun1, img_wx_sun2, img_wx_sun3, img_wx_sun4, img_wx_sun5, img_wx_sun6, img_wx_sun7 ] }
        - animimg: { id: wx2_a_partly, align: CENTER, x: 0, y: -58, duration: 800ms, repeat_count: 65535, auto_start: false, hidden: true, src: [ img_wx_partly0, img_wx_partly1, img_wx_partly2, img_wx_partly3, img_wx_partly4, img_wx_partly5, img_wx_partly6, img_wx_partly7 ] }
        - label: { id: wx2_bigicon, align: CENTER, x: 0, y: -58, text: "", text_font: icons_wx_big, text_color: 0xCAD6E8, hidden: true }
        - label: { id: wx2_day, align: CENTER, x: 0, y: -10, text: "", text_font: font_artist, text_color: 0x9AA6B2 }
        - label: { id: wx2_temp, align: CENTER, x: 0, y: 24, text: "--", text_font: montserrat_34, text_color: 0xFFFFFF }
        - label: { id: wx2_cond, align: CENTER, x: 0, y: 62, text: "", text_font: font_med, text_color: 0xCFE0F2 }
        # full-screen dim overlay for the day-change dip (on top; opa 0 when idle)
        - obj: { id: wx2_dim, align: CENTER, x: 0, y: 0, width: 360, height: 360, radius: 0, bg_color: 0x000000, bg_opa: 0%, border_width: 0 }
